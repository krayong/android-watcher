[project]
name = "android-watcher"
version = "1.0.3"
description = "Self-hosted CLI that watches Google's official Android sites and delivers AI-triaged change digests."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Karan Gourisaria", email = "androidwatcher@krayong.com" }]
keywords = ["android", "changelog", "monitoring", "digest", "rss", "sitemap"]
classifiers = [
	"Environment :: Console",
	"Intended Audience :: Developers",
	"License :: OSI Approved :: MIT License",
	"Operating System :: MacOS",
	"Operating System :: POSIX :: Linux",
	"Programming Language :: Python :: 3.11",
	"Programming Language :: Python :: 3.12",
	"Topic :: Software Development",
]
dependencies = [
	"httpx==0.28.1",
	"defusedxml==0.7.1",
	"platformdirs==4.10.0",
	"textual==8.2.7",
]

[project.scripts]
android-watcher = "android_watcher.cli:main"

[project.urls]
Homepage = "https://github.com/krayong/android-watcher"
Repository = "https://github.com/krayong/android-watcher"
Issues = "https://github.com/krayong/android-watcher/issues"

[dependency-groups]
dev = [
	"pre-commit==4.6.0",
	"pytest==9.1.1",
	"pytest-asyncio==1.4.0",
	"pyyaml==6.0.3",
	"ruff==0.15.18",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/android_watcher"]
# The baseline seed is generated by scripts/build_seed.py (locally or via the
# seed workflow) and committed. `artifacts` bundles it into the build; it does
# not fail when absent, so a checkout without a generated seed still builds (the
# detectors fall back to their fetch-free first-run baseline).
artifacts = ["src/android_watcher/seed/seed.sql.gz"]

[tool.hatch.build.targets.wheel.force-include]
"src/android_watcher/catalog/catalog.toml" = "android_watcher/catalog/catalog.toml"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# Tab indentation is intentional (see [tool.ruff.format]); W191/E101 conflict
# with it (docstring bodies keep space alignment the formatter does not touch).
ignore = ["W191", "E101"]

[tool.ruff.lint.per-file-ignores]
# html.py embeds minified CSS inside string literals; line length is unavoidable.
"src/android_watcher/notify/html.py" = ["E501"]

[tool.ruff.format]
indent-style = "tab"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
asyncio_mode = "auto"
