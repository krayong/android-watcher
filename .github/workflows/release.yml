name: release

# Manual, bump-driven release. Pick the semver part to bump; the job computes the
# new version from the current one, commits it to main, publishes to PyPI, tags and
# publishes a GitHub release, then refreshes the Homebrew formula as a best-effort,
# non-blocking step.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver part to bump (relative to the current version)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write        # push the bump commit, the formula commit, and the tag

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    environment: prod      # holds the PYPI_TOKEN secret

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # full history so we can push back and tag
          # Push to main as the repo owner (a ruleset bypass actor) rather than the
          # ambient GITHUB_TOKEN / github-actions[bot], which the main ruleset blocks.
          # On a user-owned repo the GitHub Actions integration cannot be added to the
          # bypass list, so a fine-grained PAT (contents: write) is used instead.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git as the release bot
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Bump version
        id: bump
        run: |
          uv version --bump "${{ inputs.bump }}"
          NEW=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped ${{ inputs.bump }} -> $NEW"

      - name: Run tests (no live network)
        run: uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - name: Commit version bump to main
        run: |
          git add pyproject.toml uv.lock
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

      # Tag and publish a GitHub release right after the publish succeeds, before
      # the best-effort Homebrew step. A formula hiccup must never leave a
      # published version untagged or unreleased. --generate-notes builds the
      # changelog from merged PRs and commits since the previous release.
      - name: Tag and publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --verify-tag \
            --latest

      # Regenerate the Homebrew formula deterministically (uv + PyPI) and commit it.
      # Uses no Homebrew tooling, so it is immune to the tap, tap-trust, and PyPI
      # reproducibility-cutoff failures that made `brew update-python-resources`
      # unusable on a same-day release. Kept non-blocking: PyPI and the tag are
      # already published by this point, so a formula hiccup must not fail the run.
      - name: Update Homebrew formula
        continue-on-error: true
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          python3 scripts/update_formula.py "$VERSION"
          git add Formula/android-watcher.rb
          git commit -m "chore: update homebrew formula for v${VERSION}"
          git push origin HEAD:main
